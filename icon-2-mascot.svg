<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 검정 배경 -->
  <circle cx="100" cy="100" r="95" fill="#111111" />

  <!-- 몸통 (동그란 노란 캐릭터) -->
  <ellipse cx="100" cy="105" rx="48" ry="50" fill="#FFD700" />

  <!-- 얼굴: "1" = 코, "00" = 눈 -->
  <!-- 왼쪽 0 눈 -->
  <ellipse cx="80" cy="95" rx="12" ry="13" fill="white" stroke="#333" stroke-width="2" />
  <circle cx="82" cy="96" r="5.5" fill="#222" />
  <circle cx="84" cy="94" r="2" fill="white" />

  <!-- 오른쪽 0 눈 -->
  <ellipse cx="120" cy="95" rx="12" ry="13" fill="white" stroke="#333" stroke-width="2" />
  <circle cx="122" cy="96" r="5.5" fill="#222" />
  <circle cx="124" cy="94" r="2" fill="white" />

  <!-- "1" 코 -->
  <rect x="96" y="88" width="8" height="22" rx="3" fill="#E6A800" />

  <!-- 입 (미소) -->
  <path d="M 82 118 Q 100 132 118 118" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round" />

  <!-- 볼 터치 -->
  <ellipse cx="68" cy="110" rx="7" ry="4" fill="#FF9F43" opacity="0.5" />
  <ellipse cx="132" cy="110" rx="7" ry="4" fill="#FF9F43" opacity="0.5" />

  <!-- 왼팔 (흔드는 중) -->
  <path d="M 52 108 Q 30 90 28 72" stroke="#FFD700" stroke-width="10" fill="none" stroke-linecap="round" />
  <!-- 왼손 -->
  <circle cx="28" cy="70" r="7" fill="#FFD700" />

  <!-- 오른팔 -->
  <path d="M 148 108 Q 165 115 170 130" stroke="#FFD700" stroke-width="10" fill="none" stroke-linecap="round" />
  <!-- 오른손 -->
  <circle cx="170" cy="132" r="7" fill="#FFD700" />

  <!-- 왼발 -->
  <ellipse cx="82" cy="158" rx="12" ry="7" fill="#E6A800" />
  <!-- 오른발 -->
  <ellipse cx="118" cy="158" rx="12" ry="7" fill="#E6A800" />
</svg>
