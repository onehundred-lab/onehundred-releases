<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 배경 원 -->
  <circle cx="100" cy="100" r="95" fill="#ffffff" />
  
  <!-- 몸통 -->
  <ellipse cx="100" cy="130" rx="50" ry="35" fill="#5BA4CF" />
  
  <!-- 머리 -->
  <ellipse cx="100" cy="92" rx="40" ry="35" fill="#6BB8E0" />
  
  <!-- 주둥이 -->
  <ellipse cx="100" cy="107" rx="28" ry="18" fill="#8ED0F0" />
  
  <!-- 콧구멍 -->
  <ellipse cx="91" cy="105" rx="4" ry="3" fill="#3A7CA5" />
  <ellipse cx="109" cy="105" rx="4" ry="3" fill="#3A7CA5" />
  
  <!-- 선글라스 브릿지 -->
  <path d="M 90 82 Q 100 85 110 82" stroke="#1a1a1a" stroke-width="2.5" fill="none" />
  
  <!-- 왼쪽 선글라스 -->
  <ellipse cx="80" cy="80" rx="12" ry="9" fill="#1a1a1a" />
  <ellipse cx="80" cy="80" rx="10" ry="7" fill="#222222" />
  <ellipse cx="78" cy="78" rx="2.5" ry="1.5" fill="#3a3a3a" opacity="0.5" />
  
  <!-- 오른쪽 선글라스 -->
  <ellipse cx="120" cy="80" rx="12" ry="9" fill="#1a1a1a" />
  <ellipse cx="120" cy="80" rx="10" ry="7" fill="#222222" />
  <ellipse cx="118" cy="78" rx="2.5" ry="1.5" fill="#3a3a3a" opacity="0.5" />
  
  <!-- 선글라스 다리 -->
  <line x1="68" y1="80" x2="60" y2="76" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" />
  <line x1="132" y1="80" x2="140" y2="76" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" />
  
  <!-- 왼쪽 귀 -->
  <ellipse cx="68" cy="62" rx="10" ry="8" fill="#6BB8E0" transform="rotate(-20 68 62)" />
  <ellipse cx="68" cy="62" rx="6" ry="5" fill="#8ED0F0" transform="rotate(-20 68 62)" />
  
  <!-- 오른쪽 귀 -->
  <ellipse cx="132" cy="62" rx="10" ry="8" fill="#6BB8E0" transform="rotate(20 132 62)" />
  <ellipse cx="132" cy="62" rx="6" ry="5" fill="#8ED0F0" transform="rotate(20 132 62)" />
  
  <!-- 다리 -->
  <rect x="72" y="152" width="16" height="18" rx="8" fill="#5BA4CF" />
  <rect x="112" y="152" width="16" height="18" rx="8" fill="#5BA4CF" />
  
  <!-- 입 (미소) -->
  <path d="M 88 113 Q 100 121 112 113" stroke="#3A7CA5" stroke-width="2" fill="none" stroke-linecap="round" />
</svg>
