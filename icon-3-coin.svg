<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE066" />
      <stop offset="50%" style="stop-color:#FFD700" />
      <stop offset="100%" style="stop-color:#DAA520" />
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:white;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:white;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- 검정 배경 -->
  <circle cx="100" cy="100" r="95" fill="#111111" />

  <!-- 코인 두께 (3D 효과) -->
  <ellipse cx="100" cy="106" rx="62" ry="62" fill="#B8860B" />

  <!-- 코인 앞면 -->
  <ellipse cx="100" cy="100" rx="62" ry="62" fill="url(#coinGrad)" />

  <!-- 코인 테두리 -->
  <ellipse cx="100" cy="100" rx="62" ry="62" fill="none" stroke="#DAA520" stroke-width="3" />
  <ellipse cx="100" cy="100" rx="55" ry="55" fill="none" stroke="#DAA520" stroke-width="1.5" opacity="0.6" />

  <!-- 코인 위 빛 반사 -->
  <ellipse cx="80" cy="78" rx="30" ry="20" fill="url(#shine)" transform="rotate(-20, 80, 78)" />

  <!-- 100 텍스트 -->
  <text x="100" y="108" text-anchor="middle" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#8B6914" opacity="0.9">100</text>

  <!-- 눈 (코인에 생명을!) -->
  <!-- 왼쪽 눈 (0 안에) -->
  <circle cx="78" cy="92" r="3.5" fill="#8B6914" />
  <circle cx="79" cy="91" r="1.2" fill="#DAA520" />

  <!-- 오른쪽 눈 (0 안에) -->
  <circle cx="122" cy="92" r="3.5" fill="#8B6914" />
  <circle cx="123" cy="91" r="1.2" fill="#DAA520" />

  <!-- 미소 -->
  <path d="M 88 112 Q 100 120 112 112" stroke="#8B6914" stroke-width="2" fill="none" stroke-linecap="round" />

  <!-- 반짝이 -->
  <polygon points="160,45 162,50 167,50 163,53 165,58 160,55 155,58 157,53 153,50 158,50" fill="white" opacity="0.8" />
  <polygon points="45,140 46,143 49,143 47,145 48,148 45,146 42,148 43,145 41,143 44,143" fill="white" opacity="0.5" />
</svg>
